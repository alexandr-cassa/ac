services:
  postgres:
    image: postgres:16
    container_name: g2048-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: g2048-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5439:5432"
    volumes:
      - g2048_data:/var/lib/postgresql/data
    networks:
      - g2048-network

  redis:
    image: redis:7-alpine
    container_name: g2048-redis
    restart: unless-stopped
    ports:
      - "6378:6379"
    networks:
      - g2048-network

  app:
    image: g2048:v2
    container_name: g2048-app
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/g2048-db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      GAME_PORT: 8909
      REDIS_HOST: redis
    ports:
      - "8909:8909"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - g2048-network

volumes:
  g2048_data:

networks:
  g2048-network:
    driver: bridge


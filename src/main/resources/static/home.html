<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2048 - Home</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-page">
  <main class="home-card">
    <h1>2048 Game</h1>
    <p class="subtitle">Choose what you want to do next.</p>

    <section class="home-actions" aria-label="Main actions">
      <a class="home-btn home-btn-secondary" href="#" id="profile-btn">Profile</a>
      <a class="home-btn home-btn-primary" href="board.html" id="new-game-btn">New Game</a>
      <a class="home-btn home-btn-secondary home-btn-disabled" href="#" id="old-game-btn" aria-disabled="true">Old Game</a>
      <a class="home-btn home-btn-secondary" href="#" id="leaderboards-btn">Leaderboards</a>
      <button class="home-btn home-btn-danger" type="button" id="logout-btn">Logout</button>
    </section>

    <p id="old-game-hint" class="home-hint">No previous game found yet.</p>
  </main>

  <script src="scripts/api.js"></script>
  <script src="scripts/home.js"></script>
</body>
</html>
